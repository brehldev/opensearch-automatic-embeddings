networks:
  search-net:
    driver: proxy
volumes:
  opensearch-data1:
  
services:
  opensearch:
    image: opensearchproject/opensearch:3@sha256:22fdee0d6db3f500a64cd27ddff3633f32244d0ea58b68ffb151cd2217f0bb0d
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=123849password!P
    ports:
      - "9200:9200"
    networks:
      - proxy
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
